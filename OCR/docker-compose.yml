services:
  keras_ocr_notebook:
    build: .
    image: keras-ocr-notebook
    container_name: keras-ocr-notebook
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    environment:
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_DEFAULT_REGION: us-east-1     
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    restart: unless-stopped
