version: "3.8" #editt

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: cda_busqueda
    volumes:
      - postgres_data:/var/lib/postgresql/data # Named volume for persistent data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Mount the SQL script for initialization
    networks:
      - app-network
    restart: unless-stopped #editt

  scrapper:
    container_name: python_scrapper
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - postgres
    networks:
      - app-network
    # (opcional) si quieres mantener el contenedor siempre vivo para EXEC, puedes añadir:
    #restart: unless-stopped

  postgrest:
    image: postgrest/postgrest
    container_name: postgrest
    environment:
      PGRST_DB_URI: postgres://postgres:mysecretpassword@postgres:5432/cda_busqueda
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
    depends_on:
      - postgres
    ports:
      - "3000:3000" # Expose PostgREST on port 3000
    networks:
      - app-network
    restart: unless-stopped #editt

  frontend:
    container_name: nextjs_frontend
    build:
      context: . # Changed from ./frontend to .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - postgrest
    networks:
      - app-network
    restart: unless-stopped

  backend:
    container_name: fastapi_backend
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    healthcheck: #EDIT
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz > /dev/null"]
      interval: 60s #EDIT
      timeout: 5s #EDIT
      retries: 6 #EDIT
      start_period: 30s #EDIT
    depends_on:
      - postgrest
    networks:
      - app-network
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1
      - PYTHONUNBUFFERED=1 #editt
    working_dir: /app #editt
    volumes:
      - ./backend:/app #editt  # monta el código del backend (donde está app.py)
      - ./scripts:/app/scripts:ro #editt  # monta tus scrapers para que /app/scripts exista
    restart: unless-stopped #editt

  scheduler:
    build: ./scheduler
    container_name: scheduler
    depends_on:
      backend: #editt
        condition: service_healthy #editt
    environment:
      SCHEDULE_EVERY_SECONDS: "600" #PRUEBA CON 600s    
      # endpoint interno del backend en la red de Docker
      BACKEND_TRIGGER_URL: "http://backend:8000/run-scrapers"
      # tiempo máximo de espera del POST
      TRIGGER_TIMEOUT_SECONDS: "180"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: # Define named volume here
